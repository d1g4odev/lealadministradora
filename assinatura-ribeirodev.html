<!-- [INÍCIO] Assinatura ribeirodev.com -->
<div style="

  margin-top: 2rem;
  padding-top: 1.25rem;
  text-align: center;
">
  <p style="
    font-size: 0.72rem;
    color: #64748b;          /* ajuste: cor do texto do footer do seu projeto */

    font-family: inherit;
    margin: 0;
  ">
    Site desenvolvido por
    <span style="color: #94a3b8; font-weight: 500;">Rodrigo Ribeiro</span>
    <span style="margin: 0 0.4rem; color: #334155;">&middot;</span>

    <span style="margin: 0 0.4rem; color: #334155;">&middot;</span>
    <a href="https://ribeirodev.com"
       target="_blank"
       rel="noopener"
       style="color: #94a3b8; font-weight: 500; text-decoration: none; transition: color .2s;"
       onmouseover="this.style.color='#ffffff'"
       onmouseout="this.style.color='#94a3b8'">
      ribeirodev.com
    </a><sup style="color: #475569; font-size: 0.55rem; margin-left: 1px;">&reg;</sup>
